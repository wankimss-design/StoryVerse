<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel | StoryVerse</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="admin.css">
</head>
<body class="bg-[#0a0a0a] text-white">

    <div class="flex min-h-screen">
        <aside class="w-64 border-r border-white/5 bg-[#0f0f0f] p-6 hidden md:flex flex-col sticky top-0 h-screen">
            <div class="mb-10 flex items-center gap-3">
                <div class="w-8 h-8 bg-purple-600 rounded-lg flex items-center justify-center shadow-lg shadow-purple-600/20">
                    <i class="fa-solid fa-bolt-lightning text-xs text-white"></i>
                </div>
                <span class="font-black uppercase tracking-tighter italic text-xl">Story<span class="text-purple-500">Verse</span></span>
            </div>
            <nav class="space-y-2 flex-1">
                <p class="text-[10px] font-black uppercase tracking-[0.2em] text-gray-600 ml-3 mb-4">Menu Utama</p>
                <a href="index.html" class="flex items-center gap-3 p-4 text-gray-400 hover:text-white hover:bg-white/5 rounded-2xl transition-all group">
                    <i class="fa-solid fa-house group-hover:text-purple-500"></i> 
                    <span class="text-xs font-bold uppercase tracking-widest">Laman Utama</span>
                </a>
                <a href="#" class="flex items-center gap-3 p-4 bg-purple-600 text-white rounded-2xl shadow-lg shadow-purple-600/20">
                    <i class="fa-solid fa-gauge-high"></i> 
                    <span class="text-xs font-bold uppercase tracking-widest">Dashboard Admin</span>
                </a>
            </nav>
        </aside>

        <div class="fixed bottom-10 left-1/2 -translate-x-1/2 z-[10000]">
            <div class="nav-container-floating flex items-center bg-[#151515]/80 backdrop-blur-xl p-1.5 rounded-2xl border border-white/5 shadow-2xl">
                <a href="index.html" class="nav-btn-icon" title="Home"><i class="fa-solid fa-house"></i></a>
                <a href="katalog.html" class="nav-btn-icon" title="Archive"><i class="fa-solid fa-box-archive"></i></a>
                <a href="profile.html" class="nav-btn-icon" title="Profile"><i class="fa-solid fa-user"></i></a>
                <button id="themeToggle" class="nav-btn-icon" title="Toggle Theme">
                    <i class="fa-solid fa-moon" id="themeIcon"></i>
                </button>
            </div>
        </div>

        <main class="flex-1 p-6 md:p-12 overflow-y-auto">
            <header class="mb-12">
                <h1 class="text-4xl font-black text-white uppercase tracking-tighter">Pengurusan <span class="text-purple-500">Karya</span></h1>
                <p class="text-gray-500 text-sm mt-2">Cipta dunia baru atau kemaskini naratif anda.</p>
            </header>

            <div class="grid grid-cols-1 lg:grid-cols-2 gap-10">
                <section class="bg-[#121212] p-8 rounded-[2.5rem] border border-white/5 shadow-2xl">
                    <form id="newNovelForm" class="space-y-6">
                        <div>
                            <label class="text-[10px] uppercase font-black tracking-widest text-gray-500 ml-2 mb-2 block">Tajuk Novel</label>
                            <input type="text" id="newTitle" placeholder="Masukkan tajuk..." class="admin-input">
                        </div>

                        <div class="grid grid-cols-2 gap-4">
                            <div class="relative">
                                <label class="text-[10px] uppercase font-black tracking-widest text-gray-500 ml-2 mb-2 block">Genre</label>
                                <button type="button" id="genreToggle" class="admin-input flex justify-between items-center cursor-pointer min-h-[50px] w-full">
                                    <span id="selectedGenresDisplay" class="text-xs font-bold text-gray-400">PILIH GENRE...</span>
                                    <i class="fa-solid fa-chevron-down text-[10px] transition-transform" id="genreChevron"></i>
                                </button>
                                <div id="genreDropdown" class="absolute left-0 right-0 mt-2 bg-[#151515] border border-white/10 rounded-2xl z-[9999] max-h-60 overflow-y-auto shadow-2xl hidden">
                                    <div class="genre-item p-4 hover:bg-white/5 cursor-pointer flex justify-between items-center" data-value="Romance">
                                        <span class="text-[10px] font-bold uppercase tracking-widest">Romance</span>
                                        <i class="fa-solid fa-heart text-purple-500 opacity-0 transition-all"></i>
                                    </div>
                                    <div class="genre-item p-4 hover:bg-white/5 cursor-pointer flex justify-between items-center" data-value="Fantasy">
                                        <span class="text-[10px] font-bold uppercase tracking-widest">Fantasy</span>
                                        <i class="fa-solid fa-wand-sparkles text-purple-500 opacity-0 transition-all"></i>
                                    </div>
                                    <div class="genre-item p-4 hover:bg-white/5 cursor-pointer flex justify-between items-center" data-value="Horror">
                                        <span class="text-[10px] font-bold uppercase tracking-widest">Horror</span>
                                        <i class="fa-solid fa-ghost text-purple-500 opacity-0 transition-all"></i>
                                    </div>
                                    <div class="genre-item p-4 hover:bg-white/5 cursor-pointer flex justify-between items-center" data-value="Action">
                                        <span class="text-[10px] font-bold uppercase tracking-widest">Action</span>
                                        <i class="fa-solid fa-gun text-purple-500 opacity-0 transition-all"></i>
                                    </div>
                                </div>
                            </div>
                            <div>
                                <label class="text-[10px] uppercase font-black tracking-widest text-gray-500 ml-2 mb-2 block">Upload Cover</label>
                                <label for="coverFile" class="w-full bg-white/5 border border-dashed border-white/10 rounded-2xl p-4 text-center cursor-pointer hover:border-purple-500 transition-all block min-h-[50px] flex items-center justify-center">
                                    <span id="fileNameDisplay" class="text-[10px] font-bold text-gray-400 uppercase">PILIH GAMBAR</span>
                                </label>
                                <input type="file" id="coverFile" accept="image/*" class="hidden">
                            </div>
                        </div>

                        <textarea id="newSinopsis" rows="4" class="admin-input resize-none" placeholder="Sinopsis..."></textarea>
                        <button type="submit" id="mainSubmitBtn" class="w-full bg-purple-600 hover:bg-purple-700 text-white font-black uppercase tracking-widest py-5 rounded-2xl transition-all">Publish Novel</button>
                    </form>
                </section>
            </div>
        </main>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="firebase-config.js"></script>
    <script src="admin.js"></script>
</body>
</html>
