<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Story Verse | Join the Dimension</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="antialiased">

    <div class="auth-container">
        <div class="blob"></div>
        <div class="blob blob-2"></div>

        <div class="glass-login max-w-md w-full p-10 rounded-[2rem] mx-4 relative">
            <div class="text-center mb-10">
                <h1 class="text-xs tracking-[0.5em] text-purple-400 font-bold uppercase mb-2">Access Portal</h1>
                <h2 id="authTitle" class="text-4xl font-black italic tracking-tighter text-white">LOG MASUK</h2>
            </div>

            <form id="authForm" class="space-y-5">
                <div class="relative">
                    <input type="email" id="email" placeholder="Email Address" 
                           class="input-glass w-full p-4 rounded-xl outline-none transition-all placeholder:text-gray-600" required>
                </div>
                
                <div class="relative">
                    <input type="password" id="password" placeholder="Password" 
                           class="input-glass w-full p-4 rounded-xl outline-none transition-all placeholder:text-gray-600" required>
                </div>

                <button type="submit" id="submitBtn" 
                        class="w-full bg-white text-black font-black py-4 rounded-xl hover:bg-purple-500 hover:text-white transition-all duration-500 transform hover:scale-[1.02] shadow-xl">
                    ENTER VERSE
                </button>
            </form>

            <div class="mt-8 text-center">
                <p class="text-sm text-gray-500">
                    <span id="toggleText">Belum ada akses?</span>
                    <button id="toggleAuth" class="text-white font-bold hover:text-purple-400 transition ml-1">Daftar Sekarang</button>
                </p>
                <a href="index.html" class="inline-block mt-6 text-xs text-gray-700 hover:text-gray-400 uppercase tracking-widest transition">
                    ← Back to Story Verse
                </a>
            </div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="firebase-config.js"></script>

    <script>
        const authForm = document.getElementById('authForm');
        const authTitle = document.getElementById('authTitle');
        const submitBtn = document.getElementById('submitBtn');
        const toggleAuth = document.getElementById('toggleAuth');
        const toggleText = document.getElementById('toggleText');

        let isLogin = true;

        toggleAuth.addEventListener('click', () => {
            isLogin = !isLogin;
            authTitle.innerText = isLogin ? "LOG MASUK" : "DAFTAR AKAUN";
            submitBtn.innerText = isLogin ? "ENTER VERSE" : "CREATE IDENTITY";
            toggleText.innerText = isLogin ? "Belum ada akses?" : "Sudah ada akses?";
            toggleAuth.innerText = isLogin ? "Daftar Sekarang" : "Log Masuk";
            
            // Animasi sedikit bila tukar
            authTitle.style.transform = "scale(0.9)";
            setTimeout(() => authTitle.style.transform = "scale(1)", 100);
        });

        authForm.addEventListener('submit', (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            submitBtn.innerText = "AUTHENTICATING...";
            submitBtn.disabled = true;

            if (isLogin) {
                firebase.auth().signInWithEmailAndPassword(email, password)
                    .then(() => window.location.href = 'index.html')
                    .catch(err => {
                        alert(err.message);
                        submitBtn.innerText = "ENTER VERSE";
                        submitBtn.disabled = false;
                    });
            } else {
                firebase.auth().createUserWithEmailAndPassword(email, password)
                    .then(() => window.location.href = 'index.html')
                    .catch(err => {
                        alert(err.message);
                        submitBtn.innerText = "CREATE IDENTITY";
                        submitBtn.disabled = false;
                    });
            }
        });
    </script>
</body>
</html>
