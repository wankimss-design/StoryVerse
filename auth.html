<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Story Verse | Portal Dimensi Baru</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-[#0a0a0a] min-h-screen flex items-center justify-center p-6 antialiased">

    <div id="container" class="container-sliding flex items-center justify-center">
        
        <div class="form-box login-form">
            <div class="text-center mb-10">
                <h2 class="text-3xl font-black italic tracking-tighter text-white uppercase text-gradient">Log Masuk</h2>
                <p class="text-gray-500 text-sm mt-2">Masuk ke portal Story Verse anda.</p>
            </div>

            <form id="loginForm" class="space-y-4">
                <input type="email" id="loginEmail" placeholder="Alamat Emel" class="input-auth" required>
                <input type="password" id="loginPassword" placeholder="Kata Laluan" class="input-auth" required>
                
                <button type="submit" class="btn-auth mt-4">LOG MASUK</button>
            </form>

            <p class="mt-8 text-center text-sm text-gray-500">
                Belum ada akaun?
                <button id="toRegister" class="text-purple-500 font-bold hover:underline transition">Daftar Sekarang</button>
            </p>
            <a href="index.html" class="block text-center mt-6 text-xs text-gray-700 hover:text-white transition">Back to Main</a>
        </div>

        <div class="form-box register-form">
            <div class="text-center mb-10">
                <h2 class="text-3xl font-black italic tracking-tighter text-purple-400 uppercase">Daftar Akaun</h2>
                <p class="text-gray-500 text-sm mt-2">Cipta identiti untuk membaca di Verse.</p>
            </div>

            <form id="registerForm" class="space-y-4">
                <input type="email" id="registerEmail" placeholder="Alamat Emel Baru" class="input-auth" required>
                <input type="password" id="registerPassword" placeholder="Cipta Kata Laluan (min 6 char)" class="input-auth" required>
                
                <button type="submit" class="btn-auth mt-4">DAFTAR IDENTITI</button>
            </form>

            <p class="mt-8 text-center text-sm text-gray-500">
                Sudah ada akaun?
                <button id="toLogin" class="text-purple-500 font-bold hover:underline transition">Log Masuk Sini</button>
            </p>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="firebase-config.js"></script>

    <script>
        // --- LOGIK NAVIGASI (ANIMASI BERGERAK) ---
        const container = document.getElementById('container');
        const toRegisterBtn = document.getElementById('toRegister');
        const toLoginBtn = document.getElementById('toLogin');

        // Bila orang klik "Daftar Sekarang", hantar borang ke Daftar
        toRegisterBtn.addEventListener('click', () => {
            container.classList.add('active'); // JavaScript menambah kelas 'active' ke CSS
        });

        // Bila orang klik "Log Masuk Sini", hantar borang kembali ke Log Masuk
        toLoginBtn.addEventListener('click', () => {
            container.classList.remove('active'); // JavaScript membuang kelas 'active'
        });

        // --- LOGIK FIREBASE (Bekerja di Belakang Tab) ---
        
        // 1. Borang Log Masuk
        const loginForm = document.getElementById('loginForm');
        loginForm.addEventListener('submit', (e) => {
            e.preventDefault();
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;
            
            // Kod asal Firebase awak
            firebase.auth().signInWithEmailAndPassword(email, password)
                .then(() => window.location.href = 'index.html') // Berjaya, balik ke page utama
                .catch(err => alert("Gagal Log Masuk: " + err.message));
        });

        // 2. Borang Daftar
        const registerForm = document.getElementById('registerForm');
        registerForm.addEventListener('submit', (e) => {
            e.preventDefault();
            const email = document.getElementById('registerEmail').value;
            const password = document.getElementById('registerPassword').value;

            // Kod asal Firebase awak
            firebase.auth().createUserWithEmailAndPassword(email, password)
                .then(() => window.location.href = 'index.html') // Berjaya, balik ke page utama
                .catch(err => alert("Gagal Daftar: " + err.message));
        });
    </script>
</body>
</html>
