<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detail Novel | StoryVerse</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="detail.css">
</head>
<body class="bg-[#0a0a0a] text-white min-h-screen transition-colors duration-500">

    <nav class="fixed top-0 left-0 w-full z-50 bg-[#0a0a0a]/80 backdrop-blur-md border-b border-white/5 h-20 flex items-center">
        <div class="max-w-7xl mx-auto px-6 w-full flex justify-between items-center">
            <a href="katalog.html" class="flex items-center gap-3 group">
                <i class="fa-solid fa-arrow-left text-gray-400 group-hover:text-purple-500 transition-colors"></i>
                <span class="text-xl font-black italic tracking-tighter uppercase">Story<span class="text-purple-500">Verse</span></span>
            </a>
            <div class="flex items-center gap-4">
                <button onclick="toggleTheme()" class="text-gray-400 hover:text-purple-400 p-2"><i class="fa-solid fa-circle-half-stroke text-lg"></i></button>
            </div>
        </div>
    </nav>

    <main class="max-w-6xl mx-auto px-6 pt-32 pb-20">
        <div class="grid grid-cols-1 lg:grid-cols-12 gap-12 items-start">
            
            <div class="lg:col-span-4 sticky top-32">
                <div class="cover-container relative group">
                    <img id="novelCover" src="" alt="Cover" class="w-full rounded-[32px] shadow-2xl shadow-purple-500/10 object-cover aspect-[3/4]">
                    <div class="absolute inset-0 rounded-[32px] border border-white/10 pointer-events-none"></div>
                </div>
            </div>

            <div class="lg:col-span-8">
                <div class="flex flex-wrap gap-2 mb-6">
                    <span id="novelGenre" class="bg-purple-500/10 text-purple-400 text-[10px] font-black uppercase tracking-widest px-4 py-1.5 rounded-full border border-purple-500/20">Genre</span>
                    <span id="novelStatus" class="bg-white/5 text-gray-400 text-[10px] font-black uppercase tracking-widest px-4 py-1.5 rounded-full border border-white/10">Status</span>
                </div>

                <h1 id="novelTitle" class="text-5xl md:text-7xl font-black italic tracking-tighter uppercase mb-6 leading-tight">Tajuk Novel</h1>
                
                <div class="flex items-center gap-4 mb-10 pb-10 border-b border-white/5">
                    <div class="w-10 h-10 rounded-full bg-gradient-to-br from-purple-600 to-pink-600 flex items-center justify-center font-bold text-xs" id="authorInitial">A</div>
                    <div>
                        <p class="text-[10px] text-gray-500 uppercase tracking-widest font-bold">Penulis</p>
                        <p id="novelAuthor" class="text-sm font-bold">Nama Penulis</p>
                    </div>
                </div>

                <div class="mb-12">
                    <h2 class="text-xs font-black uppercase tracking-[0.3em] text-purple-500 mb-4">Sinopsis</h2>
                    <p id="novelSinopsis" class="text-gray-400 leading-relaxed text-lg">
                        Memuatkan sinopsis novel...
                    </p>
                </div>

                <div class="flex flex-wrap gap-4">
                    <button id="btnRead" class="bg-white text-black px-10 py-5 rounded-2xl font-black uppercase text-[11px] tracking-[0.2em] hover:bg-purple-500 hover:text-white transition-all transform hover:scale-105 active:scale-95 shadow-xl shadow-white/5">
                        Mula Membaca
                    </button>
                    <button class="bg-white/5 border border-white/10 text-white px-8 py-5 rounded-2xl font-black uppercase text-[11px] tracking-[0.2em] hover:bg-white/10 transition-all">
                        <i class="fa-regular fa-bookmark mr-2"></i> Simpan
                    </button>
                </div>
            </div>

        </div>
    </main>

    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="firebase-config.js"></script>
    <script src="detail.js"></script>
</body>
</html>
