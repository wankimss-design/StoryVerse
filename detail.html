<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detail Novel | StoryVerse</title>
    
    <link rel="stylesheet" href="detail.css">
    
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-[#0a0a0a] text-white min-h-screen transition-colors duration-500 font-['Plus_Jakarta_Sans']">

    <div id="bgGlow" class="fixed inset-0 -z-10 opacity-30 blur-[120px]"></div>

    <nav class="fixed top-0 w-full z-50 px-12 md:px-20 h-24 flex items-center justify-between pointer-events-none">
        <button onclick="history.back()" class="w-11 h-11 rounded-full bg-white/5 backdrop-blur-md flex items-center justify-center border border-white/10 hover:bg-purple-500 hover:text-white transition-all pointer-events-auto shadow-xl">
            <i class="fa-solid fa-arrow-left"></i>
        </button>

        <div class="flex items-center gap-4 pointer-events-auto">
            <div class="nav-pill flex items-center gap-4 backdrop-blur-xl px-5 py-2.5 rounded-2xl shadow-2xl">
                <button onclick="location.href='katalog.html'" class="w-10 h-10 rounded-xl bg-white/10 flex items-center justify-center transition-all hover:scale-110">
                    <i class="fa-solid fa-house text-sm"></i>
                </button>
                <button class="text-gray-400 hover:text-white transition-all">
                    <i class="fa-solid fa-box-archive text-sm"></i>
                </button>
                
                <button onclick="location.href='profile.html'" class="w-10 h-10 rounded-xl bg-white/5 border border-white/10 flex items-center justify-center text-gray-400 hover:bg-purple-500 hover:text-white hover:border-purple-500 transition-all">
                    <i class="fa-solid fa-user text-sm"></i>
                </button>

                <button onclick="toggleTheme()" class="text-gray-400 hover:text-white transition-all">
                    <i id="themeIcon" class="fa-solid fa-moon text-sm"></i>
                </button>
            </div>

            <button class="w-12 h-12 rounded-full bg-white/5 backdrop-blur-md flex items-center justify-center border border-white/10 hover:text-pink-500 transition-all shadow-xl group">
                <i class="fa-solid fa-heart group-active:scale-125 transition-transform"></i>
            </button>
        </div>
    </nav>

    <main class="pt-32 max-w-6xl mx-auto px-6 pb-20">
        <div class="flex flex-col lg:flex-row gap-12 items-start mb-20">
            <div class="w-full lg:w-80 shrink-0 group">
                <div class="relative aspect-[3/4] rounded-[2.5rem] overflow-hidden shadow-[0_0_60px_rgba(168,85,247,0.2)] border border-white/10 transition-transform duration-500 group-hover:scale-[1.02]">
                    <img id="detailCover" src="" class="w-full h-full object-cover">
                    <div class="absolute inset-0 bg-gradient-to-t from-[#0a0a0a] via-transparent to-transparent opacity-60"></div>
                </div>
            </div>

            <div class="flex-1 lg:pt-4">
                <div class="flex items-center gap-3 mb-6">
                    <span id="detailGenre" class="bg-purple-500/10 text-purple-400 px-4 py-1.5 rounded-full text-[10px] font-black uppercase tracking-[0.2em] border border-purple-500/20">Genre</span>
                    <span id="detailStatus" class="bg-white/5 text-gray-400 px-4 py-1.5 rounded-full text-[10px] font-black uppercase tracking-[0.2em] border border-white/5 italic text-xs">Status</span>
                </div>

                <h1 id="detailTitle" class="text-5xl md:text-7xl font-black tracking-tighter mb-8 italic uppercase leading-[0.9] text-glow">Tajuk Novel</h1>
                
                <div class="grid grid-cols-3 gap-4 mb-10 max-w-md">
                    <div class="bg-white/5 border border-white/5 p-4 rounded-2xl text-center backdrop-blur-md">
                        <p class="text-[10px] uppercase opacity-40 font-bold mb-1">Views</p>
                        <p class="font-black text-purple-500 italic text-lg">1.2K</p>
                    </div>
                    <div class="bg-white/5 border border-white/5 p-4 rounded-2xl text-center backdrop-blur-md">
                        <p class="text-[10px] uppercase opacity-40 font-bold mb-1">Rating</p>
                        <p class="font-black text-yellow-500 italic text-lg">4.9</p>
                    </div>
                    <div class="bg-white/5 border border-white/5 p-4 rounded-2xl text-center backdrop-blur-md">
                        <p class="text-[10px] uppercase opacity-40 font-bold mb-1">Bab</p>
                        <p class="font-black text-blue-500 italic text-lg">10</p>
                    </div>
                </div>

                <div class="flex items-center gap-4 mb-10">
                    <button onclick="startReading()" class="flex-1 md:flex-none bg-gradient-to-r from-purple-600 to-pink-600 hover:from-purple-500 hover:to-pink-500 text-white px-12 py-5 rounded-2xl font-black uppercase tracking-widest text-[10px] transition-all transform active:scale-95 shadow-lg">
                        Mula Membaca
                    </button>
                    <button class="w-14 h-14 rounded-2xl bg-white/5 border border-white/10 flex items-center justify-center hover:text-pink-500 transition-all">
                        <i class="fa-solid fa-share-nodes text-xl"></i>
                    </button>
                </div>

                <div class="max-w-2xl">
                    <h3 class="text-sm font-black uppercase tracking-[0.2em] mb-4 text-purple-500">Sinopsis</h3>
                    <div id="sinopsisContainer">
                        <p id="detailSinopsis" class="text-gray-400 leading-relaxed text-lg font-medium opacity-80 line-clamp-3 transition-all duration-500">
                            Memuatkan sinopsis...
                        </p>
                        <button id="viewMoreBtn" onclick="toggleSinopsis()" class="mt-4 text-purple-400 hover:text-purple-300 font-bold text-[10px] uppercase tracking-widest flex items-center gap-2">
                            View More <i class="fa-solid fa-chevron-down text-[8px]"></i>
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <div class="bg-white/[0.02] border border-white/5 rounded-[3rem] p-8 md:p-12 backdrop-blur-xl">
            <div class="flex justify-between items-end mb-12 px-2">
                <div>
                    <h3 class="text-3xl font-black uppercase italic tracking-tighter">Senarai <span class="text-purple-500">Bab</span></h3>
                    <p class="text-[10px] uppercase opacity-30 tracking-[0.3em] mt-2">Dikuasakan oleh StoryVerse</p>
                </div>
            </div>
            <div id="chapterList" class="grid md:grid-cols-2 gap-4"></div>
        </div>
    </main>

    <script>
        function toggleTheme() {
            document.body.classList.toggle('light-mode');
            const themeIcon = document.getElementById('themeIcon');
            const isLight = document.body.classList.contains('light-mode');
            if (themeIcon) {
                themeIcon.classList.toggle('fa-moon', !isLight);
                themeIcon.classList.toggle('fa-sun', isLight);
            }
        }

        function toggleSinopsis() {
            const sinopsis = document.getElementById('detailSinopsis');
            const btn = document.getElementById('viewMoreBtn');
            if (sinopsis.classList.contains('line-clamp-3')) {
                sinopsis.classList.remove('line-clamp-3');
                btn.innerHTML = `Show Less <i class="fa-solid fa-chevron-up text-[8px]"></i>`;
            } else {
                sinopsis.classList.add('line-clamp-3');
                btn.innerHTML = `View More <i class="fa-solid fa-chevron-down text-[8px]"></i>`;
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            const params = new URLSearchParams(window.location.search);
            const title = params.get('title') || "Karya StoryVerse";
            const genre = params.get('genre') || "Romantik";
            const status = params.get('status') || "Ongoing";
            const cover = params.get('cover') || "https://images.unsplash.com/photo-1512820790803-83ca734da794?w=800";

            document.getElementById('detailTitle').innerText = title;
            document.getElementById('detailGenre').innerText = genre;
            document.getElementById('detailStatus').innerText = status;
            document.getElementById('detailCover').src = cover;
            
            const glow = document.getElementById('bgGlow');
            glow.style.background = `radial-gradient(circle at center, rgba(168,85,247,0.4) 0%, rgba(10,10,10,1) 80%), url('${cover}')`;
            glow.style.backgroundSize = "cover";
            
            document.getElementById('detailSinopsis').innerText = `Masuki dunia "${title}", sebuah karya agung bergenre ${genre}. Di sini anda akan menemui pengembaraan yang tidak pernah dibayangkan sebelum ini.`;

            const chapterTitles = ["Permulaan Takdir", "Bayangan Silam", "Pertemuan Di Hujan", "Langkah Pertama", "Rahsia Terbongkar", "Di Persimpangan", "Mencari Jawapan", "Hati Yang Keliru", "Harapan Terakhir", "Pengakhiran Abadi"];
            const list = document.getElementById('chapterList');
            
            for(let i = 1; i <= 10; i++) {
                list.innerHTML += `
                    <div class="group flex items-center justify-between p-6 bg-white/[0.03] border border-white/5 rounded-[2rem] hover:bg-purple-600/10 hover:border-purple-500/50 transition-all duration-300 cursor-pointer" onclick="goToReader(${i})">
                        <div class="flex items-center gap-6">
                            <span class="text-2xl font-black italic opacity-10 group-hover:opacity-100 group-hover:text-purple-500 transition-all">${i.toString().padStart(2, '0')}</span>
                            <div>
                                <p class="text-sm font-bold opacity-80 group-hover:opacity-100">${chapterTitles[i-1]}</p>
                                <p class="text-[9px] uppercase tracking-widest opacity-30 mt-1">400 - 500 Patah Perkataan</p>
                            </div>
                        </div>
                        <div class="w-10 h-10 rounded-full border border-white/10 flex items-center justify-center group-hover:bg-purple-500 group-hover:border-purple-500 transition-all shadow-lg">
                            <i class="fa-solid fa-play text-[10px] ml-1"></i>
                        </div>
                    </div>`;
            }
        });

        function goToReader(chapterNum) {
            const title = document.getElementById('detailTitle').innerText;
            window.location.href = `reader.html?title=${encodeURIComponent(title)}&chapter=${chapterNum}`;
        }
        function startReading() { goToReader(1); }
    </script>
</body>
</html>
