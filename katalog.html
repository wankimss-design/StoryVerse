<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Katalog Eksklusif | StoryVerse</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="katalog.css">
</head>
<body class="bg-[#0a0a0a] text-white min-h-screen transition-colors duration-500" id="mainBody">

    <nav class="fixed top-0 left-0 w-full z-50 bg-[#0a0a0a]/70 backdrop-blur-xl border-b border-white/5 transition-all duration-300">
        <div class="max-w-7xl mx-auto px-6 h-20 flex justify-between items-center">
            
            <a href="index.html" class="flex items-center gap-2 group">
                <div class="w-10 h-10 bg-gradient-to-tr from-purple-600 to-pink-600 rounded-xl flex items-center justify-center shadow-lg shadow-purple-500/20 group-hover:rotate-12 transition-transform">
                    <i class="fa-solid fa-book-open text-white"></i>
                </div>
                <span class="text-2xl font-black italic tracking-tighter text-white">STORY<span class="text-purple-500">VERSE</span></span>
            </a>

            <div class="flex items-center gap-2 md:gap-6">
                <button class="text-gray-400 hover:text-white transition-colors p-2">
                    <i class="fa-solid fa-magnifying-glass text-lg"></i>
                </button>

                <button onclick="toggleTheme()" class="text-gray-400 hover:text-yellow-400 transition-colors p-2">
                    <i class="fa-solid fa-moon text-lg" id="themeIcon"></i>
                </button>
                
                <div class="flex items-center gap-3 pl-4 border-l border-white/10">
                    <div class="hidden md:flex flex-col items-end">
                        <span id="navUserName" class="text-[10px] font-black uppercase tracking-widest text-white">Memuatkan...</span>
                        <button onclick="logout()" class="text-[9px] text-red-500 font-bold hover:text-red-400 transition uppercase italic">Log Keluar</button>
                    </div>
                    <div class="w-10 h-10 rounded-full border-2 border-purple-500 overflow-hidden shadow-lg shadow-purple-500/20">
                        <img id="navAvatar" src="https://ui-avatars.com/api/?name=User&background=a855f7&color=fff" class="w-full h-full object-cover">
                    </div>
                </div>
            </div>
        </div>
    </nav>

    <div class="h-32"></div>

    <header class="max-w-7xl mx-auto px-6 mb-12">
        <h1 class="text-5xl md:text-6xl font-black italic tracking-tighter">
            DIMENSI <span class="text-transparent bg-clip-text bg-gradient-to-r from-purple-400 to-pink-500">NOVEL</span>
        </h1>
        <p class="text-gray-500 mt-2 italic">Selamat kembali, <span id="welcomeName" class="text-white font-bold text-normal">Penulis</span>. Teruskan pembacaan anda.</p>
    </header>

    <main class="max-w-7xl mx-auto px-6 pb-20">
        <div id="katalogGrid" class="katalog-grid">
            </div>
    </main>

    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="firebase-config.js"></script>
    <script src="katalog.js"></script>
</body>
</html>
