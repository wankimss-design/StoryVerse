<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Katalog Novel | StoryVerse</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=Itim&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
    
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="katalog.css">
</head>
<body class="bg-[#0a0a0a] text-white min-h-screen">

    <div class="fixed top-0 left-0 w-full h-full overflow-hidden pointer-events-none -z-10">
        <div class="absolute top-[-10%] right-[-10%] w-[600px] h-[600px] bg-purple-900/10 blur-[150px] rounded-full"></div>
        <div class="absolute bottom-[-10%] left-[-10%] w-[600px] h-[600px] bg-pink-900/5 blur-[150px] rounded-full"></div>
    </div>

    <nav class="fixed top-0 left-0 w-full z-50 bg-[#0a0a0a]/70 backdrop-blur-xl border-b border-white/5 transition-all duration-300">
        <div class="max-w-7xl mx-auto px-6 h-20 flex justify-between items-center">
            <a href="index.html" class="flex items-center gap-2 group">
                <div class="w-10 h-10 bg-gradient-to-tr from-purple-600 to-pink-600 rounded-xl flex items-center justify-center shadow-lg shadow-purple-500/20 group-hover:rotate-12 transition-transform">
                    <i class="fa-solid fa-book-open text-white text-lg"></i>
                </div>
                <span class="text-2xl font-black italic tracking-tighter text-white">STORY<span class="text-purple-500">VERSE</span></span>
            </a>

            <div class="hidden md:flex items-center gap-10">
                <a href="index.html" class="text-[10px] font-bold uppercase tracking-[0.2em] text-gray-400 hover:text-purple-400 transition">Utama</a>
                <a href="katalog.html" class="text-[10px] font-bold uppercase tracking-[0.2em] text-white border-b-2 border-purple-500 pb-1">Katalog</a>
                <a href="#" class="text-[10px] font-bold uppercase tracking-[0.2em] text-gray-400 hover:text-purple-400 transition">Komuniti</a>
            </div>

            <div class="flex items-center gap-6">
                <button class="text-gray-400 hover:text-white transition-colors">
                    <i class="fa-solid fa-magnifying-glass text-lg"></i>
                </button>
                
                <div id="authContainer">
                    <a href="auth.html" id="navAuthBtn" class="relative group">
                        <div class="absolute -inset-1 bg-gradient-to-r from-purple-600 to-pink-600 rounded-xl blur opacity-20 group-hover:opacity-100 transition duration-500"></div>
                        <button class="relative px-6 py-2.5 bg-[#151515] rounded-xl text-[10px] font-black uppercase tracking-widest text-white border border-white/10 flex items-center gap-2">
                            <i class="fa-solid fa-user-astronaut text-purple-500"></i>
                            <span id="navAuthText">Masuk</span>
                        </button>
                    </a>
                </div>
            </div>
        </div>
    </nav>

    <div class="h-28"></div>

    <header class="max-w-7xl mx-auto px-6 mb-12">
        <h1 class="text-5xl md:text-6xl font-black italic tracking-tighter mb-4">
            KATALOG <span class="text-transparent bg-clip-text bg-gradient-to-r from-purple-400 to-pink-500">NOVEL</span>
        </h1>
        <div class="flex flex-col md:flex-row justify-between items-start md:items-center gap-4">
            <p class="text-gray-500 italic max-w-xl">Terokai ribuan pengembaraan digital yang ditulis oleh komuniti StoryVerse.</p>
            
            <div class="flex gap-3">
                <select class="bg-white/5 border border-white/10 text-gray-400 text-[10px] font-bold uppercase tracking-widest px-4 py-3 rounded-xl focus:outline-none focus:border-purple-500 transition">
                    <option>Semua Genre</option>
                    <option>Romantik</option>
                    <option>Fantasi</option>
                </select>
            </div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-6 pb-20">
        <div id="katalogGrid" class="katalog-grid">
            <p class="text-gray-600 italic animate-pulse">Memuatkan dimensi cerita...</p>
        </div>
    </main>

    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="firebase-config.js"></script>
    <script src="katalog.js"></script>
</body>
</html>
