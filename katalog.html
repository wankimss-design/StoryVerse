<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Katalog Eksklusif | StoryVerse</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="katalog.css">
</head>
<body class="bg-[#0a0a0a] text-white min-h-screen transition-colors duration-500" id="mainBody">

<nav id="navbar" class="fixed top-0 left-0 w-full z-50 bg-[#0a0a0a]/70 backdrop-blur-xl border-b border-white/5 h-20 flex items-center transition-all duration-500">
    <div class="max-w-7xl mx-auto px-6 w-full flex justify-between items-center gap-4">
        
        <a href="index.html" class="flex items-center gap-2 shrink-0">
            <div class="w-10 h-10 bg-gradient-to-tr from-purple-600 to-pink-600 rounded-xl flex items-center justify-center shadow-lg group-hover:rotate-12 transition-transform">
                <i class="fa-solid fa-book-open text-white"></i>
            </div>
            <span class="text-xl font-black italic tracking-tighter logo-text">STORYVERSE</span>
        </a>

        <div class="flex-1 flex justify-end items-center gap-4">
            <div class="relative w-full max-w-[250px] md:max-w-[400px] group">
                <i class="fa-solid fa-magnifying-glass absolute left-3 top-1/2 -translate-y-1/2 text-gray-500 text-xs group-focus-within:text-purple-500 transition-colors z-20"></i>
                <input type="text" id="searchInput" placeholder="CARI NOVEL..." 
                       class="search-input w-full bg-[#151515] border border-white/10 text-[10px] text-white rounded-xl py-2 px-4 pl-10 focus:outline-none focus:border-purple-500 focus:ring-1 focus:ring-purple-500 transition-all duration-300 outline-none uppercase tracking-widest">
            </div>

            <div class="flex items-center gap-3 shrink-0">
                <button onclick="toggleTheme()" class="text-gray-400 hover:text-yellow-400 p-2 transition-colors">
                    <i class="fa-solid fa-moon text-lg" id="themeIcon"></i>
                </button>
                
                <div class="flex items-center gap-3 pl-4 border-l border-white/10">
                    <div class="hidden md:flex flex-col items-end">
                        <span id="navUserName" class="text-[10px] font-black uppercase tracking-widest nav-name">Admin</span>
                        <button onclick="logout()" class="text-[9px] text-red-500 font-bold hover:text-red-400 transition italic">LOGOUT</button>
                    </div>
                    <div class="w-10 h-10 rounded-full border-2 border-purple-500 overflow-hidden shadow-lg shadow-purple-500/20">
                        <img id="navAvatar" src="https://ui-avatars.com/api/?name=Admin&background=a855f7&color=fff" class="w-full h-full object-cover">
                    </div>
                </div>
            </div>
        </div>

    </div>
</nav>

    <div class="h-32"></div>

    <header class="max-w-7xl mx-auto px-6 mb-10">
        <h1 class="text-5xl md:text-6xl font-black italic tracking-tighter mb-6 title-main">
            DIMENSI <span class="text-transparent bg-clip-text bg-gradient-to-r from-purple-400 to-pink-500">NOVEL</span>
        </h1>

        <div class="bg-filter border border-white/5 rounded-3xl p-6 shadow-2xl overflow-x-auto transition-colors duration-500">
            <table class="w-full text-left border-collapse min-w-[600px]">
                <thead>
                    <tr class="text-[10px] uppercase tracking-[0.2em] text-gray-500 border-b border-white/5">
                        <th class="pb-4 font-black">Kategori</th>
                        <th class="pb-4 font-black">Pilihan</th>
                    </tr>
                </thead>
                <tbody class="text-xs">
                    <tr class="border-b border-white/5">
                        <td class="py-4 text-purple-400 font-bold uppercase tracking-wider">Genre</td>
                        <td class="py-4 flex flex-wrap gap-2">
                            <label class="genre-chip"><input type="checkbox" value="Romantik"><span>Romantik</span></label>
                            <label class="genre-chip"><input type="checkbox" value="Fantasi"><span>Fantasi</span></label>
                            <label class="genre-chip"><input type="checkbox" value="Seram"><span>Seram</span></label>
                            <label class="genre-chip"><input type="checkbox" value="Aksi"><span>Aksi</span></label>
                            <label class="genre-chip"><input type="checkbox" value="Misteri"><span>Misteri</span></label>
                        </td>
                    </tr>
                    <tr>
                        <td class="py-4 text-pink-400 font-bold uppercase tracking-wider">Status</td>
                        <td class="py-4 flex gap-2">
                            <label class="genre-chip"><input type="checkbox" value="Ongoing"><span>Ongoing</span></label>
                            <label class="genre-chip"><input type="checkbox" value="Complete"><span>Complete</span></label>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-6 pb-20">
        <div id="katalogGrid" class="katalog-grid"></div>
    </main>

    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="firebase-config.js"></script>
    <script src="katalog.js"></script>
</body>
</html>
