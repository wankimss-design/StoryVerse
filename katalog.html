<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Katalog Eksklusif | StoryVerse</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="katalog.css">
</head>
<body class="bg-[#0a0a0a] text-white min-h-screen transition-colors duration-500" id="mainBody">

    <nav id="navbar" class="fixed top-0 left-0 w-full z-50 bg-[#0a0a0a]/80 backdrop-blur-md border-b border-white/5 h-20 flex items-center transition-all duration-500">
        <div class="max-w-7xl mx-auto px-6 w-full flex justify-between items-center gap-4">
            
            <a href="index.html" class="flex items-center gap-3 shrink-0 group">
                <div class="w-11 h-11 bg-gradient-to-br from-purple-600 to-pink-600 rounded-2xl flex items-center justify-center logo-icon-anim shadow-lg shadow-purple-500/20">
                    <i class="fa-solid fa-bolt text-white text-xl"></i>
                </div>
                <span class="text-2xl font-black italic tracking-tighter logo-text uppercase">Story<span class="text-purple-500">Verse</span></span>
            </a>

            <div class="flex-1 flex justify-end items-center gap-4">
                <div class="relative w-full max-w-[350px] group">
                    <i class="fa-solid fa-magnifying-glass absolute left-4 top-1/2 -translate-y-1/2 text-gray-500 text-[10px] group-focus-within:text-purple-500 transition-colors"></i>
                    <input type="text" id="searchInput" placeholder="CARI KARYA ANDA..." 
                           class="search-input w-full bg-white/5 border border-white/10 text-[10px] text-white rounded-full py-3 px-11 focus:outline-none focus:border-purple-500 transition-all outline-none uppercase tracking-[0.2em]">
                </div>

                <button onclick="toggleTheme()" class="text-gray-400 hover:text-purple-400 p-2 transition-transform active:scale-90">
                    <i class="fa-solid fa-circle-half-stroke text-lg" id="themeIcon"></i>
                </button>

                <a href="profile.html" class="relative group shrink-0">
                    <div class="w-11 h-11 rounded-full overflow-hidden border-2 border-purple-500/30 group-hover:border-purple-500 transition-all duration-300 shadow-lg shadow-purple-500/20">
                        <img id="navProfileImg" 
                             src="https://images.unsplash.com/photo-1633332755192-727a05c4013d?w=400&h=400&fit=crop" 
                             alt="Profile" 
                             class="w-full h-full object-cover">
                    </div>
                    <div class="absolute -inset-1 bg-purple-500/20 rounded-full blur opacity-0 group-hover:opacity-100 transition-opacity duration-300"></div>
                </a>

                <button onclick="logout()" class="text-gray-400 hover:text-red-500 p-2 transition-colors">
                    <i class="fa-solid fa-right-from-bracket"></i>
                </button>
            </div>
        </div>
    </nav>

    <div class="h-32"></div>

    <header class="max-w-7xl mx-auto px-6 mb-12">
        <h1 class="text-4xl md:text-6xl font-black italic tracking-tighter uppercase mb-10 overflow-visible">
            <span class="title-main-container">
                Katalog 
                <span class="text-transparent bg-clip-text bg-gradient-to-r from-purple-400 to-pink-500 text-glow perkataan-karya">
                    Karya
                </span>
            </span>
        </h1>
        
        <div class="flex flex-wrap gap-3">
            <div class="relative dropdown-group">
                <button onclick="toggleDropdown('genreMenu')" class="bg-white/5 border border-white/10 px-6 py-3 rounded-2xl text-[10px] font-black uppercase tracking-widest flex items-center gap-3 hover:bg-white/10 transition-all dropdown-btn">
                    Genre <i class="fa-solid fa-chevron-down text-[8px] opacity-40"></i>
                </button>
                <div id="genreMenu" class="absolute top-full left-0 mt-3 w-56 bg-[#0f0f0f] border border-white/10 rounded-2xl p-2 hidden z-40 shadow-2xl menu-box">
                    <label class="dropdown-item"><input type="checkbox" name="genre" value="Romantik"><span>Romantik</span></label>
                    <label class="dropdown-item"><input type="checkbox" name="genre" value="Fantasi"><span>Fantasi</span></label>
                    <label class="dropdown-item"><input type="checkbox" name="genre" value="Seram"><span>Seram</span></label>
                    <label class="dropdown-item"><input type="checkbox" name="genre" value="Aksi"><span>Aksi</span></label>
                    <label class="dropdown-item"><input type="checkbox" name="genre" value="Misteri"><span>Misteri</span></label>
                </div>
            </div>

            <div class="relative dropdown-group">
                <button onclick="toggleDropdown('statusMenu')" class="bg-white/5 border border-white/10 px-6 py-3 rounded-2xl text-[10px] font-black uppercase tracking-widest flex items-center gap-3 hover:bg-white/10 transition-all dropdown-btn">
                    Status <i class="fa-solid fa-chevron-down text-[8px] opacity-40"></i>
                </button>
                <div id="statusMenu" class="absolute top-full left-0 mt-3 w-56 bg-[#0f0f0f] border border-white/10 rounded-2xl p-2 hidden z-40 shadow-2xl menu-box">
                    <label class="dropdown-item"><input type="radio" name="status" value="Ongoing"><span>Ongoing</span></label>
                    <label class="dropdown-item"><input type="radio" name="status" value="Complete"><span>Complete</span></label>
                    <div class="my-2 border-t border-white/5"></div>
                    <label class="dropdown-item"><input type="radio" name="status" value="" checked><span>Semua Status</span></label>
                </div>
            </div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-6 pb-20">
        <div id="katalogGrid" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-8">
            <p class="col-span-full text-center py-20 opacity-20 text-[10px] uppercase tracking-[0.5em]">Memuatkan Karya...</p>
        </div>
    </main>

    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    
    <script src="firebase-config.js"></script>
    <script src="katalog.js"></script>

</body>
</html>
