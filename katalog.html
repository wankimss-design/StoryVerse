<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Story Verse | Semua Koleksi</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-[#0a0a0a] text-white antialiased">

    <nav class="p-6 max-w-7xl mx-auto flex justify-between items-center">
        <a href="index.html" class="text-2xl font-black italic text-purple-500">STORY VERSE</a>
        <a href="index.html" class="text-sm font-bold hover:text-purple-400">← Balik Utama</a>
    </nav>

    <section class="max-w-7xl mx-auto px-6 py-12">
        <div class="text-center mb-16">
            <h1 class="text-5xl font-black tracking-tighter mb-6 uppercase">Teroka Koleksi</h1>
            
            <div class="max-w-2xl mx-auto relative group">
                <input type="text" id="searchInput" 
                       class="w-full bg-[#1a1a1a] border border-gray-800 p-5 pl-14 rounded-2xl outline-none focus:border-purple-500 focus:ring-2 focus:ring-purple-500/20 transition-all text-lg"
                       placeholder="Cari tajuk novel atau genre...">
                <div class="absolute left-5 top-1/2 -translate-y-1/2 text-gray-500 group-focus-within:text-purple-500 transition">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
                    </svg>
                </div>
            </div>
        </div>

        <div id="katalogGrid" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-6 gap-6">
            </div>

        <div id="noResult" class="hidden text-center py-20">
            <p class="text-gray-500 italic">Maaf, novel tersebut belum wujud dalam dimensi ini...</p>
        </div>
    </section>

    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="firebase-config.js"></script>

    <script>
        const katalogGrid = document.getElementById('katalogGrid');
        const searchInput = document.getElementById('searchInput');
        const noResult = document.getElementById('noResult');
        let allNovels = []; // Tempat simpan data sementara untuk carian laju

        // 1. Ambil semua data dari Firestore
        async function loadKatalog() {
            try {
                const snapshot = await db.collection('novels').get();
                allNovels = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                displayNovels(allNovels);
            } catch (error) {
                console.error("Gagal ambil data:", error);
            }
        }

        // 2. Fungsi untuk paparkan kad novel
        function displayNovels(novels) {
            katalogGrid.innerHTML = "";
            
            if (novels.length === 0) {
                noResult.classList.remove('hidden');
                return;
            } else {
                noResult.classList.add('hidden');
            }

            novels.forEach(novel => {
                const card = `
                    <div class="novel-card group">
                        <div class="card-image-wrapper shadow-lg shadow-black">
                            <img src="${novel.image}" class="card-img" alt="${novel.title}">
                            <div class="card-badge">${novel.tag || 'NEW'}</div>
                        </div>
                        <div class="mt-3">
                            <h3 class="font-bold text-sm uppercase tracking-tight group-hover:text-purple-500 transition">${novel.title}</h3>
                            <p class="text-[10px] text-gray-500 uppercase font-bold mt-1">${novel.genre}</p>
                        </div>
                    </div>
                `;
                katalogGrid.innerHTML += card;
            });
        }

        // 3. Logik Carian (Real-time Filter)
        searchInput.addEventListener('input', (e) => {
            const keyword = e.target.value.toLowerCase();
            const filtered = allNovels.filter(n => 
                n.title.toLowerCase().includes(keyword) || 
                n.genre.toLowerCase().includes(keyword)
            );
            displayNovels(filtered);
        });

        loadKatalog();
    </script>
</body>
</html>
