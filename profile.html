<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profil Saya | StoryVerse</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="profile.css">
</head>
<body class="bg-[#0a0a0a] text-white min-h-screen">

    <nav class="fixed top-0 left-0 w-full z-50 bg-[#0a0a0a]/80 backdrop-blur-md border-b border-white/5 h-20 flex items-center">
        <div class="max-w-7xl mx-auto px-6 w-full flex justify-between items-center">
            <a href="katalog.html" class="flex items-center gap-3">
                <div class="w-10 h-10 bg-gradient-to-br from-purple-600 to-pink-600 rounded-xl flex items-center justify-center shadow-lg shadow-purple-500/20">
                    <i class="fa-solid fa-bolt text-white text-sm"></i>
                </div>
                <span class="text-xl font-black italic tracking-tighter uppercase">Story<span class="text-purple-500">Verse</span></span>
            </a>
            <button onclick="logout()" class="text-xs font-bold uppercase tracking-widest text-gray-500 hover:text-red-500 transition-colors">
                Log Keluar <i class="fa-solid fa-arrow-right-from-bracket ml-2"></i>
            </button>
        </div>
    </nav>

    <main class="max-w-5xl mx-auto px-6 pt-32 pb-20">
        <div class="flex flex-col md:flex-row items-center gap-8 mb-16 p-8 rounded-[40px] bg-gradient-to-b from-white/5 to-transparent border border-white/5">
            <div class="relative group">
                <div class="w-32 h-32 rounded-full p-1 bg-gradient-to-tr from-purple-500 to-pink-500 shadow-2xl shadow-purple-500/20">
                    <img id="userAvatar" src="https://ui-avatars.com/api/?name=User&background=000&color=fff" class="w-full h-full rounded-full object-cover border-4 border-[#0a0a0a]">
                </div>
                <button class="absolute bottom-1 right-1 w-8 h-8 bg-white text-black rounded-full flex items-center justify-center text-xs shadow-xl hover:scale-110 transition-transform">
                    <i class="fa-solid fa-camera"></i>
                </button>
            </div>
            
            <div class="text-center md:text-left">
                <h1 id="userName" class="text-4xl font-black italic tracking-tighter uppercase mb-2">Nama Pengguna</h1>
                <p id="userEmail" class="text-gray-500 text-sm mb-4">emel@contoh.com</p>
                <div class="flex gap-4 justify-center md:justify-start">
                    <div class="text-center bg-white/5 px-6 py-2 rounded-2xl border border-white/5">
                        <p class="text-[10px] text-purple-500 font-black uppercase tracking-widest">Dibaca</p>
                        <p class="text-lg font-bold">12</p>
                    </div>
                    <div class="text-center bg-white/5 px-6 py-2 rounded-2xl border border-white/5">
                        <p class="text-[10px] text-pink-500 font-black uppercase tracking-widest">Koleksi</p>
                        <p class="text-lg font-bold">5</p>
                    </div>
                </div>
            </div>
        </div>

        <div class="flex gap-8 border-b border-white/5 mb-10 overflow-x-auto pb-1">
            <button class="tab-btn active" data-tab="reading">Sedang Dibaca</button>
            <button class="tab-btn" data-tab="saved">Simpanan</button>
            <button class="tab-btn" data-tab="settings">Tetapan</button>
        </div>

        <div id="tabContent">
            <div class="grid grid-cols-2 md:grid-cols-4 gap-6" id="readingList">
                </div>
        </div>
    </main>

    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="firebase-config.js"></script>
    <script src="profile.js"></script>
</body>
</html>
