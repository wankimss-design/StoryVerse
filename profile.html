<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Profil | StoryVerse</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="profile.css">
</head>
<body class="bg-[#0a0a0a] text-white min-h-screen">

    <nav class="fixed top-0 left-0 w-full z-50 bg-[#0a0a0a]/80 backdrop-blur-md border-b border-white/5 h-20 flex items-center">
        <div class="max-w-7xl mx-auto px-6 w-full flex justify-between items-center">
            <a href="index.html" class="flex items-center gap-3 group">
                <div class="w-10 h-10 bg-purple-600 rounded-xl flex items-center justify-center shadow-lg shadow-purple-500/20 group-hover:rotate-12 transition-transform">
                    <i class="fa-solid fa-bolt text-white text-sm"></i>
                </div>
                <span class="text-xl font-black italic tracking-tighter uppercase">Story<span class="text-purple-500">Verse</span></span>
            </a>
            <a href="katalog.html" class="text-[10px] font-black uppercase tracking-[0.2em] text-gray-500 hover:text-white transition-colors">Kembali Ke Katalog</a>
        </div>
    </nav>

    <main class="max-w-5xl mx-auto px-6 pt-32 pb-20">
        
        <div class="relative overflow-hidden rounded-[40px] border border-white/5 bg-gradient-to-b from-white/5 to-transparent p-8 md:p-12 mb-12">
            <div class="absolute -top-24 -right-24 w-64 h-64 bg-purple-600/20 blur-[100px]"></div>
            
            <div class="relative flex flex-col md:flex-row items-center gap-10">
                <div class="relative">
                    <div class="w-32 h-32 md:w-40 md:h-40 rounded-full p-1 bg-gradient-to-tr from-purple-500 via-pink-500 to-orange-500 shadow-2xl">
                        <img id="userAvatar" src="https://ui-avatars.com/api/?name=User&background=000&color=fff" class="w-full h-full rounded-full object-cover border-4 border-[#0a0a0a]">
                    </div>
                    <div class="absolute bottom-2 right-2 w-6 h-6 bg-green-500 border-4 border-[#0a0a0a] rounded-full" title="Online"></div>
                </div>

                <div class="text-center md:text-left flex-1">
                    <span class="bg-purple-500/10 text-purple-400 text-[9px] font-black uppercase tracking-widest px-3 py-1 rounded-full border border-purple-500/20 mb-4 inline-block">Pembaca Setia</span>
                    <h1 id="userName" class="text-4xl md:text-6xl font-black italic tracking-tighter uppercase mb-2">Nama Pengguna</h1>
                    <p id="userEmail" class="text-gray-500 text-sm mb-6 font-medium">emel@pengguna.com</p>
                    
                    <div class="flex flex-wrap gap-4 justify-center md:justify-start">
                        <button onclick="logout()" class="bg-white text-black px-6 py-3 rounded-xl font-black uppercase text-[10px] tracking-widest hover:bg-purple-500 hover:text-white transition-all">Log Keluar</button>
                        <button class="bg-white/5 border border-white/10 px-6 py-3 rounded-xl font-black uppercase text-[10px] tracking-widest hover:bg-white/10 transition-all">Edit Profil</button>
                    </div>
                </div>
            </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-12 gap-10">
            
            <div class="md:col-span-4 space-y-6">
                <div class="p-6 rounded-3xl border border-white/5 bg-white/5">
                    <h3 class="text-[10px] font-black uppercase tracking-[0.2em] text-gray-500 mb-6">Statistik Bacaan</h3>
                    <div class="space-y-4">
                        <div class="flex justify-between items-center">
                            <span class="text-sm text-gray-400">Novel Dibaca</span>
                            <span class="font-bold">24</span>
                        </div>
                        <div class="flex justify-between items-center">
                            <span class="text-sm text-gray-400">Koleksi Simpanan</span>
                            <span class="font-bold">12</span>
                        </div>
                        <div class="flex justify-between items-center">
                            <span class="text-sm text-gray-400">Peringkat</span>
                            <span class="text-purple-500 font-bold uppercase text-xs">Elite</span>
                        </div>
                    </div>
                </div>
            </div>

            <div class="md:col-span-8">
                <div class="flex gap-8 border-b border-white/5 mb-8 pb-1">
                    <button class="tab-btn active" data-tab="reading">Sedang Dibaca</button>
                    <button class="tab-btn" data-tab="saved">Simpanan</button>
                </div>

                <div id="readingList" class="grid grid-cols-2 gap-6">
                    </div>
            </div>

        </div>
    </main>

    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="firebase-config.js"></script>
    <script src="profile.js"></script>
</body>
</html>
